<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Roupas</title>
    <style>
        /* Estilos Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            color: #333;
        }

        /* Cabeçalho / Menu */
        header {
            background-color: #fff;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #e67e22;
        }

        /* Seção Principal (Com a sua imagem de fundo) */
        .hero {
            /* Aqui entra o nome da imagem que você fez o upload */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('19860.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            margin-top: 60px; /* Compensa o menu fixo */
        }

        .hero h2 {
            font-size: 50px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn {
            padding: 15px 30px;
            background-color: #e67e22;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #d35400;
        }

        /* Rodapé */
        footer {
            background-color: #222;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Sua Marca</h1>
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Ofertas</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>A Nova Coleção Chegou</h2>
        <p>Estilo e conforto para o seu dia a dia.</p>
        <a href="#" class="btn">Ver Produtos</a>
    </section>

    <footer>
        <p>&copy; 2026 Sua Marca de Roupas. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
